<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --good: #1a7f37; --warn: #b35900; --bad: #c62828;
    --border: #e0e0e0; --muted: #666;
  }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 12.5px; color: #222; margin: 0; width: 560px; max-height: 580px;
    overflow-y: auto; background: #fafafa;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: #fff; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 2;
  }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  button {
    font: inherit; padding: 6px 14px; border-radius: 6px; cursor: pointer;
    border: 1px solid #1a5fb4; background: #1a5fb4; color: #fff; font-weight: 600;
  }
  button:disabled { opacity: 0.55; cursor: default; }
  button.secondary { background: #fff; color: #1a5fb4; }
  main { padding: 12px 14px; }
  .url { color: var(--muted); word-break: break-all; margin-bottom: 10px; }
  .verdict {
    padding: 10px 12px; border-radius: 8px; font-weight: 600; margin-bottom: 10px;
    border: 1px solid;
  }
  .verdict.good { background: #e8f5e9; border-color: var(--good); color: var(--good); }
  .verdict.warn { background: #fff3e0; border-color: var(--warn); color: var(--warn); }
  .verdict.bad  { background: #ffebee; border-color: var(--bad);  color: var(--bad); }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; margin-bottom: 12px; }
  .kv div:nth-child(odd) { color: var(--muted); }
  h2 { font-size: 12.5px; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.04em; color: #444; }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { font-weight: 600; background: #f0f2f5; position: sticky; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  tr.pre td { background: #ffebee; }
  tr.cmp td { background: #e3f2fd; }
  .tag { display: inline-block; padding: 0 6px; border-radius: 8px; font-size: 11px; background: #eee; }
  .empty { color: var(--muted); font-style: italic; padding: 6px 0; }
  .note { color: var(--muted); font-size: 11.5px; margin-top: 10px; line-height: 1.4; }
  .exports { margin-top: 12px; display: flex; gap: 8px; }
  #status { color: var(--muted); }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <h1>Consent Load-Order Scanner</h1>
    <button id="scanBtn">Scan this site</button>
  </header>
  <main id="content">
    <div class="empty">Open the site you want to check, then click <b>Scan this site</b>.
      The page reloads with cookies cleared so the scan reflects a first visit with no consent given.</div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
